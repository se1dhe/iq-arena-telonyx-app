<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IQ Arena</title>
    <link rel="stylesheet" href="/app/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="page">
    <header class="hero">
        <div class="badge">TELONYX</div>
        <h1>IQ Arena</h1>
        <p>Быстрая PvP-викторина 1v1 прямо в Telegram.</p>
    </header>

    <main class="card">
        <div id="status" class="status">Готовим арену...</div>
        <div class="tabs">
            <button id="arenaTab" class="tab active" type="button">Арена</button>
            <button id="leaderboardTab" class="tab" type="button">Топ</button>
            <button id="profileTab" class="tab" type="button">Профиль</button>
        </div>
        <div id="ratingLine" class="rating-line hidden"></div>
        <div id="scoreboard" class="scoreboard hidden"></div>
        <div id="questionBox" class="question-box hidden">
            <div id="roundLabel" class="round-label"></div>
            <h2 id="questionText"></h2>
            <div id="timer" class="timer"></div>
            <div id="answers" class="answers"></div>
            <div id="explanation" class="explanation hidden"></div>
        </div>
        <div id="leaderboardPanel" class="panel hidden">
            <div id="leaderboardList" class="leaderboard-list"></div>
        </div>
        <div id="profilePanel" class="panel hidden">
            <div class="profile-grid">
                <div>
                    <span>Имя</span>
                    <strong id="profileName">—</strong>
                </div>
                <div>
                    <span>Handle</span>
                    <strong id="profileHandle">—</strong>
                </div>
                <div>
                    <span>Invite</span>
                    <strong id="profileReferral">—</strong>
                </div>
            </div>
        </div>
        <button id="playBtn" class="primary" type="button">Найти соперника</button>
    </main>
</div>
<script src="/app/app.js"></script>
</body>
</html>
