server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: iq-arena
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iqarena}
    username: ${SPRING_DATASOURCE_USERNAME:iqarena}
    password: ${SPRING_DATASOURCE_PASSWORD:iqarena}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    ttl-minutes: ${APP_JWT_TTL_MINUTES:1440}
  ws-ticket:
    ttl-seconds: ${APP_WS_TICKET_TTL_SECONDS:60}
  game:
    rounds: 5
    round-seconds: 10
