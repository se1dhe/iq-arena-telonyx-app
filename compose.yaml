services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: iqarena
      POSTGRES_USER: iqarena
      POSTGRES_PASSWORD: iqarena
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iqarena -d iqarena"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - iqarena_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  iqarena_postgres:
